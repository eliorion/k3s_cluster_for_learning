# Ordering: databases (CNPG cluster + secrets) → db-migrations (Flyway Job)
# → apps. databases uses the talos-staging overlay (recovery seed + longhorn
# storage); db-migrations and apps reuse the cluster-agnostic staging paths.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: infra-cnpg-plugin # CNPG operator + barman plugin must exist first
  retryInterval: 1m
  # First reconcile recovers asp-db from R2 (base backup download + WAL replay).
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/talos-staging/databases
  prune: true
  wait: true # Ready when the CNPG Cluster reports Ready
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
# Runs the Flyway Job and gates the `apps` Kustomization on its success.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: db-migrations
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: databases # needs asp-db (and its asp-db-app secret) + ghcr-pull-secret
  retryInterval: 1m
  timeout: 5m # > backoffLimit(3) x migration runtime
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging/databases/db-migrations
  prune: true
  force: true # Job is immutable — image-tag bump must delete+recreate
  wait: true # Ready only when the Job COMPLETES; failed Job = NotReady
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: db-migrations # schema must be migrated before new app images roll out
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging
  prune: true

  decryption:
    provider: sops
    secretRef:
      name: sops-age
