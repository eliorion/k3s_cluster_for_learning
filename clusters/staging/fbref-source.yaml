# Source for the fbref app Helm chart — the asp repo (chart lives at
# k8s/charts/fbref), scoped to that path. CI bumps images.fbref.tag on every
# fbref release, and the fbref HelmRelease (reconcileStrategy: Revision) upgrades
# on every commit touching this path — zero manual steps per release.
#
# Reuses the read-only asp-deploy-key Secret (same repo as the asp source).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fbref
  namespace: flux-system
spec:
  interval: 1m0s
  url: ssh://git@github.com/Eliorion/asp
  ref:
    branch: main
  secretRef:
    name: asp-deploy-key
  # Only the fbref chart path matters — ignore everything else so unrelated asp
  # commits don't churn the artifact (Revision strategy would re-reconcile).
  ignore: |
    /*
    !/k8s/
    /k8s/*
    !/k8s/charts/
    /k8s/charts/*
    !/k8s/charts/fbref/
