# MIGRATION STEP 1 of 2 — fbref is being folded into the asp pipeline
# (databases/apps Kustomizations, clusters/staging/apps.yaml).
# prune is disabled here so that deleting these Kustomizations in step 2 does
# NOT garbage-collect the fbref namespace / fbref-db CNPG cluster / HelmRelease.
# Push this first, wait for flux-system to reconcile, then delete this file and
# add fbref/ to the apps/staging and apps/staging/databases kustomizations.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fbref-databases
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: infra-cnpg-plugin # CNPG operator + barman plugin must exist first
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging/databases/fbref
  prune: true
  wait: true # Ready when the CNPG fbref-db Cluster reports Ready
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fbref-app
  namespace: flux-system
spec:
  interval: 1m0s
  dependsOn:
    - name: fbref-databases # needs fbref-db + its app/pull secrets first
  retryInterval: 1m
  timeout: 10m # > the HelmRelease timeout (chart helm-test + rollback)
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging/fbref
  prune: true
  wait: true
  # Surface the fbref app health here: NotReady when the fbref HelmRelease fails
  # (e.g. an upgrade auto-rolled-back), independent of asp.
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: fbref
      namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
