apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "66.2.2"

      # version: "58.x"

      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # Ignore "validated" annotation which is not inserted during install
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
  values:
    grafana:
      adminPassword: skh
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grafana-k3s.eliorion.fr
        tls:
          - secretName: grafana-tls-secret
            hosts:
              - grafana-k3s.eliorion.fr
    alertmanager:
      alertmanagerSpec:
        # Mounts secret `alertmanager-telegram` (ns monitoring) at
        # /etc/alertmanager/secrets/alertmanager-telegram/token
        secrets:
          - alertmanager-telegram
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["namespace", "alertname"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: telegram
          routes:
            # Drop the always-firing Watchdog heartbeat.
            - matchers:
                - alertname = "Watchdog"
              receiver: blackhole
        receivers:
          - name: blackhole
          - name: telegram
            telegram_configs:
              - api_url: https://api.telegram.org
                bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/token
                chat_id: -5295319950 # numeric, no quotes
                parse_mode: HTML
                send_resolved: true
                message: |-
                  {{ range .Alerts }}<b>{{ .Labels.alertname }}</b> ({{ .Labels.severity }})
                  {{ .Annotations.summary }}
                  {{ .Annotations.description }}
                  {{ end }}
