apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flux-helmrelease-failed
  namespace: monitoring
  labels:
    # Matches Prometheus ruleSelector.
    release: kube-prometheus-stack
spec:
  groups:
    - name: flux.rules
      rules:
        - alert: FluxHelmReleaseFailed
          expr: |
            max by (exported_namespace, name) (
              gotk_reconcile_condition{type="Ready", status="False", kind="HelmRelease"}
            ) == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} not ready"
            description: "Flux HelmRelease {{ $labels.exported_namespace }}/{{ $labels.name }} has been in a non-Ready state for >5m. Run: kubectl describe hr {{ $labels.name }} -n {{ $labels.exported_namespace }}"
        - alert: FluxKustomizationFailed
          expr: |
            max by (exported_namespace, name) (
              gotk_reconcile_condition{type="Ready", status="False", kind="Kustomization"}
            ) == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} not ready"
            description: "Flux Kustomization {{ $labels.exported_namespace }}/{{ $labels.name }} has been in a non-Ready state for >5m."
