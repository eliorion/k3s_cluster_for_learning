[tools]
kubectl = "latest"
k9s = "latest"
kubens = "latest"
cloudflared = "latest"
flux2  = "latest"
sops = "latest"
age = "latest"
helm = "latest"
shellcheck = "latest"
talosctl = "latest"
talhelper = "latest"
aws = { version = "latest", symlink_bins = "true" }

[tasks.sops-updatekeys]
description = "Rewrap *.enc.yaml secrets to recipients in .sops.yaml (pass -- -k FILE [--check])"
run = "scripts/sops-updatekeys"

[tasks.lint]
description = "shellcheck all scripts"
run = "shellcheck scripts/sops-updatekeys"
