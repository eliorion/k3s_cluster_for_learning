apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: flux-system
spec:
  targetNamespace: cnpg-system
  interval: 30m
  chart:
    spec:
      # appVersion v0.12.0. Renovate keeps this pinned version current.
      chart: plugin-barman-cloud
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-plugin
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
