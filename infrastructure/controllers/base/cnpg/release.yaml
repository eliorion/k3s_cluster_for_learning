apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: flux-system
spec:
  targetNamespace: cnpg-system
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.2"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      interval: 12h
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  install:
    createNamespace: true
  upgrade:
    crds: CreateReplace
  # Eneble prometeus monitoring
  monitoring:
    podMonitorEnabled: true
    grafanaDashboard:
      create: true
      namespace: monitoring
