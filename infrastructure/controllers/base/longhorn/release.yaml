apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  targetNamespace: longhorn-system
  interval: 30m
  chart:
    spec:
      # Renovate keeps this pinned version current.
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  install:
    # Namespace ships from namespace.yaml (carries the privileged PSA labels
    # Talos needs), so Helm must NOT create a bare one.
    createNamespace: false
  values:
    defaultSettings:
      # Must match the Talos kubelet extraMounts bind destination.
      defaultDataPath: /var/lib/longhorn
      # Single-node cluster: more than one replica can never be scheduled.
      defaultReplicaCount: 1
    persistence:
      defaultClassReplicaCount: 1
