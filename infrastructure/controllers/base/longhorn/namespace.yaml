apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    # Talos applies the baseline Pod Security profile by default, which blocks
    # Longhorn's privileged system access. Longhorn requires privileged here.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
