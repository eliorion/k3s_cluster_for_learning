apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
data:
  # Database: point Keycloak at the CNPG read-write service. Credentials come from the
  # CNPG-generated keycloak-db-app secret (see statefulset.yaml), not from here.
  KC_DB: postgres
  KC_DB_URL_HOST: keycloak-db-rw
  KC_DB_URL_DATABASE: keycloak

  # TLS is terminated upstream (Cloudflare). Keycloak speaks plain HTTP to the proxy and
  # trusts the forwarded headers for the real scheme/host.
  KC_HTTP_ENABLED: "true"
  KC_PROXY_HEADERS: "xforwarded"
  # Not publicly exposed yet (no Cloudflare tunnel route). When you add the route, set a
  # fixed KC_HOSTNAME (e.g. https://keycloak.eliorion.fr) and remove this for hardening.
  KC_HOSTNAME_STRICT: "false"

  KC_HEALTH_ENABLED: "true"
