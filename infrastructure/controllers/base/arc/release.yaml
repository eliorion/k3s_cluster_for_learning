apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  targetNamespace: arc-systems
  # Pin the release name so the controller Deployment is predictably named
  # arc-controller-gha-rs-controller (matches the Flux healthCheck).
  releaseName: arc-controller
  interval: 30m
  chart:
    spec:
      # Must stay in lockstep with the gha-runner-scale-set chart version
      # in infrastructure/services/staging/arc-runner-set/release.yaml.
      # Renovate keeps this pinned version current.
      chart: gha-runner-scale-set-controller
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
