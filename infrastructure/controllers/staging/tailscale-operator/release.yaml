apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  targetNamespace: tailscale
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      # Latest stable, verified against https://pkgs.tailscale.com/helmcharts.
      # Renovate keeps it current after the first install.
      version: "1.98.4"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  # OAuth creds come from the pre-created `operator-oauth` Secret (SOPS) in the
  # tailscale namespace. Leaving oauth.* empty makes the chart skip templating
  # its own Secret and use ours instead. NEVER put creds here — this file is
  # plaintext GitOps.
  values:
    oauth: {}
