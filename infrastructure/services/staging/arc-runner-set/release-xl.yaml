apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set-asp-xl
  namespace: flux-system
spec:
  targetNamespace: arc-runners
  releaseName: arc-runner-set-asp-xl
  interval: 30m
  chart:
    spec:
      # Same chart + version as the default pool (lockstep with the
      # gha-runner-scale-set-controller in controllers/base/arc/release.yaml).
      chart: gha-runner-scale-set
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: flux-system
      interval: 12h
  values:
    githubConfigUrl: https://github.com/Eliorion/asp
    # Reuses the same PAT secret as the default pool (both in arc-runners).
    githubConfigSecret: arc-github-pat
    # `runs-on: self-hosted-arc-xl` (CI_RUNNER_XL var) targets this scale set —
    # the heavy k3d e2e leg. Distinct name from the default pool (must be unique).
    runnerScaleSetName: self-hosted-arc-xl
    # Bigger, fewer runners for the full in-dind k3d stack. One warm (min 1);
    # podAntiAffinity below spreads up to maxRunners=3 one-per-node across the
    # 3-node cluster so two/three concurrent e2e runs never share a node.
    minRunners: 1
    maxRunners: 3
    # containerMode: dind reproduced manually (same as the default pool) so
    # dockerd gets --insecure-registry for the HTTP-only Nexus connectors.
    template:
      metadata:
        labels:
          # Self-owned label the podAntiAffinity selector matches (spreads XL
          # pods across nodes without depending on the chart's auto-labels).
          runner-tier: xl
      spec:
        # One XL pod per node: the full k3d stack wants a node mostly to itself
        # on this 50Gi/3-node cluster. Hard rule — a 4th would stay Pending
        # (maxRunners is 3 = node count, so that only happens if a node is down).
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    runner-tier: xl
                topologyKey: kubernetes.io/hostname
        initContainers:
          # Copies runner externals where the dind container expects them
          # (the chart's containerMode:dind injected this automatically).
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:latest
            command:
              ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
          # Native sidecar (restartPolicy: Always on an initContainer). k3d +
          # all the e2e images run INSIDE this container, so it carries the
          # memory budget: 4Gi guaranteed request (k3d steady state stays under
          # it, eviction-protected), burst to 10Gi for the e2e peak. No CPU limit
          # — CPU is compressible, so an uncapped sidecar keeps the parallel
          # docker builds fast (matches the default pool). Note: all 3 nodes are
          # control planes with no kubelet system-reserved, so if etcd shows
          # latency under heavy e2e, reserve CPU at the kubelet level rather than
          # capping the build here.
          - name: dind
            image: docker:dind
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
              # Nexus docker connectors are plain HTTP (no TLS yet).
              - --insecure-registry=nexus.nexus.svc:5000
              - --insecure-registry=nexus.nexus.svc:5001
              - --insecure-registry=nexus.nexus.svc:5002
              - --insecure-registry=nexus.nexus.svc.cluster.local:5000
              - --insecure-registry=nexus.nexus.svc.cluster.local:5001
              - --insecure-registry=nexus.nexus.svc.cluster.local:5002
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            restartPolicy: Always
            startupProbe:
              exec:
                command: ["docker", "info"]
              initialDelaySeconds: 0
              failureThreshold: 24
              periodSeconds: 2
            resources:
              requests:
                cpu: 2
                memory: 4Gi
              limits:
                memory: 10Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
        containers:
          # The runner only orchestrates (the build/k3d work is in dind), so it
          # stays small — the 4Gi budget lives on the dind sidecar above.
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                value: "120"
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                memory: 1Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
        volumes:
          - name: work
            emptyDir: {}
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
