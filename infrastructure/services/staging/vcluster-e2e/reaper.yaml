# Reaper for orphaned per-PR e2e vclusters. The CI job deletes its own vcluster
# on exit, but a runner that is killed mid-run (cancelled PR, OOM, node reboot)
# leaks a `vc-asp-e2e-*` namespace holding a full asp stack. On a single node
# those pile up and OOM the box — this CronJob deletes any such namespace older
# than TTL_SECONDS. Deleting the namespace cascades the whole vcluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-e2e-reaper
  namespace: arc-runners
---
# Namespaces are cluster-scoped, so list/delete needs a ClusterRole. Scoped to
# namespaces only (the reaper filters by the vc-asp-e2e- prefix in the script).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-e2e-reaper
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-e2e-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-e2e-reaper
subjects:
  - kind: ServiceAccount
    name: vcluster-e2e-reaper
    namespace: arc-runners
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vcluster-e2e-reaper
  namespace: arc-runners
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # Don't let a wedged reaper run forever or retry-storm.
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: vcluster-e2e-reaper
          restartPolicy: Never
          containers:
            - name: reaper
              # alpine/k8s bundles kubectl + jq.
              image: alpine/k8s:1.30.2
              env:
                - name: TTL_SECONDS
                  value: "7200" # 2h — well past a ~20min e2e run
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  now=$(date +%s)
                  kubectl get ns -o json \
                    | jq -r --argjson now "$now" --argjson ttl "$TTL_SECONDS" '
                        .items[]
                        | select(.metadata.name | startswith("vc-asp-e2e-"))
                        | select(($now - (.metadata.creationTimestamp | fromdate)) > $ttl)
                        | .metadata.name' \
                    | while read -r ns; do
                        echo "Reaping stale e2e vcluster namespace: $ns"
                        kubectl delete namespace "$ns" --wait=false
                      done
