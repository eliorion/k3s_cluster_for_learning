apiVersion: apps/v1
kind: Deployment
metadata:
  name: nocodb
  labels:
    app: nocodb
spec:
  replicas: 1
  # SQLite metadata on the PVC: two pods on one file during a RollingUpdate
  # risk corrupting it — Recreate trades a few seconds of downtime for safety.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nocodb
  template:
    metadata:
      labels:
        app: nocodb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nocodb
          # Pinned (Renovate bumps). No NC_DB → metadata in SQLite under
          # /usr/app/data (the PVC); the fbref Postgres is attached in-app as
          # an external Data Source (user `nocodb`, secret fbref-nocodb).
          image: nocodb/nocodb:2026.05.3
          ports:
            - containerPort: 8080
          env:
            - name: NC_PUBLIC_URL
              value: http://fbref.eliorion.fr
            - name: NC_DISABLE_TELE
              value: "true"
            - name: NC_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nocodb-admin
                  key: email
            - name: NC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nocodb-admin
                  key: password
          volumeMounts:
            - name: data
              mountPath: /usr/app/data
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nocodb-data
