apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NocoDB admin/browse UI over the fbref CNPG database. Namespace is set HERE
# (not on the parent apps/staging/fbref kustomization — that one carries the
# flux-system HelmRelease and must stay namespace-transformer-free).
namespace: fbref

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # Super-admin bootstrap creds (NC_ADMIN_EMAIL/NC_ADMIN_PASSWORD) — sops.
  - nocodb-admin.enc.yaml
