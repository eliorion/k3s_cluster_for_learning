# Flyway migration Job for the fbref database (mirror of ../asp for the asp DB).
# Lives under its own Flux Kustomization (clusters/staging/fbref.yaml:
# fbref-db-migrations, force+wait) — Renovate bumps the image tag; Flux
# force-recreates the Job and gates fbref-app on its completion.
# NOTE: no ttlSecondsAfterFinished — Flux owns the Job lifecycle (force).
# A TTL would delete the completed Job and make every later reconcile
# re-create + re-run it for nothing.
apiVersion: batch/v1
kind: Job
metadata:
  name: fbref-db-migrate
  namespace: fbref
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fbref-db-migrations
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret # private GHCR image; secret managed in apps/staging/databases/fbref
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # flyway image files are world-readable; verified non-root migrate
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flyway
          image: ghcr.io/eliorion/fbref-db-migrations:fbref-db-migrations-v0.1.0
          args: ["migrate"]
          env:
            # CNPG app secret (<cluster>-app for cluster "fbref-db"). jdbc-uri
            # targets the cluster's bootstrap database (fbref).
            - name: FLYWAY_URL
              valueFrom:
                secretKeyRef:
                  name: fbref-db-app
                  key: jdbc-uri
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: fbref-db-app
                  key: username
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fbref-db-app
                  key: password
            # The existing DB (provisioned by the retired postInit bootstrap)
            # gets baselined at 0, then the idempotent V-files re-run as no-ops
            # and history is populated.
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: FLYWAY_BASELINE_VERSION
              value: "0"
            - name: FLYWAY_CONNECT_RETRIES
              value: "10"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # flyway writes temp files under /flyway
            capabilities:
              drop: ["ALL"]
