# Flyway migration Job for the Automarket (asp) database.
# Lives in apps/base/asp/db/ (own Flux Kustomization — see
# flux-kustomizations.yaml). Renovate bumps the image tag; Flux force-recreates
# the Job and gates asp-apps on its completion.
# NOTE: no ttlSecondsAfterFinished — Flux owns the Job lifecycle (force).
# A TTL would delete the completed Job and make every later reconcile
# re-create + re-run it for nothing.
apiVersion: batch/v1
kind: Job
metadata:
  name: asp-db-migrate
  namespace: asp
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrations
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-pull-secret # private GHCR image; secret managed in apps/staging/asp
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # flyway image files are world-readable; verified non-root migrate
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flyway
          image: ghcr.io/eliorion/asp-db-migrations:db-migrations-v0.1.0
          args: ["migrate"]
          env:
            # CNPG app secret (<cluster>-app for cluster "staging"). jdbc-uri
            # targets the cluster's bootstrap database — must be "automarket"
            # (bootstrap.initdb.database). If it is not, use the literal URL
            # fallback below instead.
            - name: FLYWAY_URL
              valueFrom:
                secretKeyRef:
                  name: asp-db-app
                  key: jdbc-uri
            # Fallback if jdbc-uri points at the wrong DB (staging-rw = CNPG
            # read-write Service):
            # - name: FLYWAY_URL
            #   value: jdbc:postgresql://staging-rw.asp.svc:5432/automarket
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: asp-db-app
                  key: username
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asp-db-app
                  key: password
            # Existing DBs (provisioned before Flyway) get baselined at 0, then
            # the idempotent V-files re-run as no-ops and history is populated.
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: FLYWAY_BASELINE_VERSION
              value: "0"
            - name: FLYWAY_CONNECT_RETRIES
              value: "10"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # flyway writes temp files under /flyway
            capabilities:
              drop: ["ALL"]
