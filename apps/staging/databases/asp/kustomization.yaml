apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: asp

resources:
  - ../../../base/databases/asp
  # Pull secret lives here (not in apps) so the migration Job can pull
  # ghcr.io/eliorion/asp-db-migrations before the apps tier reconciles.
  - ghcr-pull-secret.enc.yaml
  - r2-backup-credentials.enc.yaml
  - objectstore.yaml
  - scheduledbackup.yaml

patches:
  # Attach the Barman Cloud Plugin for R2 backups. serverName asp-db-talos:
  # this cluster archives to its own path in the bucket — the retired k3s
  # cluster's history sits under asp-db (unmanaged; prune from R2 someday).
  # The cluster was seeded from that path at creation (seed-from-k3s
  # recovery patch, removed after verification — see doc 06 step 3).
  - path: cluster-backup-patch.yaml
    target:
      kind: Cluster
      name: asp-db
  # PVCs on Longhorn (explicit — also the cluster default SC on Talos).
  - path: cluster-storage-patch.yaml
    target:
      kind: Cluster
      name: asp-db
