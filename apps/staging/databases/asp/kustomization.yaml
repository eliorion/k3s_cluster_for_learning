apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: asp

resources:
  - ../../../base/databases/asp
  # Pull secret lives here (not in apps) so the migration Job can pull
  # ghcr.io/eliorion/asp-db-migrations before the apps tier reconciles.
  - ghcr-pull-secret.enc.yaml
  - r2-backup-credentials.enc.yaml
  - objectstore.yaml
  - scheduledbackup.yaml

patches:
  # Attach the Barman Cloud Plugin for R2 backups. Archives to asp-db-r1
  # since the 2026-06-11 volume-loss recovery (restoring FROM asp-db — see
  # cluster-recovery-patch.yaml; old asp-db path prunable once confident).
  - path: cluster-backup-patch.yaml
    target:
      kind: Cluster
      name: asp-db
  # NOTE 2026-06-12: R2 restore was impossible — WAL 2C0 (begin_wal of the
  # only base backup) died with the asp-db-talos prefix prune; asp-db is a
  # fresh initdb. Salvage attempt from the base backup tar tracked in doc 07.
  # PVCs on Longhorn (explicit — also the cluster default SC on Talos).
  - path: cluster-storage-patch.yaml
    target:
      kind: Cluster
      name: asp-db
