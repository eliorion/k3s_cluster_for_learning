apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: asp-db
spec:
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: r2-store
        # asp-db-r1: post volume-loss recovery archive (restoring FROM asp-db).
        serverName: asp-db-r1
