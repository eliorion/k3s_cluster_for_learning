apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fbref

resources:
  - ../../../base/databases/fbref
  # grafana_ro role password (basic-auth) — consumed by the CNPG managed role.
  - fbref-grafana-ro.enc.yaml
  # GHCR pull secret for the private fbref image (own ns → own pull secret).
  # Added out of band: create a read:packages PAT, sops-encrypt it as this file
  # (same name `ghcr-pull-secret`, fbref namespace).
  - ghcr-pull-secret.enc.yaml
