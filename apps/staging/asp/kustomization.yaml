apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: asp

resources:
  - ../../base/asp
  - db-secrets.enc.yaml
  - orchestrator-secrets.enc.yaml
  - content-scraper-secrets.enc.yaml
  - url-crawler-secrets.enc.yaml
  - ghcr-pull-secret.enc.yaml

images:
  - name: asp-scraper
    newName: ghcr.io/eliorion/asp-scraper
    newTag: "scraper-v0.4.0"
  - name: asp-orchestrator
    newName: ghcr.io/eliorion/asp-orchestrator
    newTag: "orchestrator-v0.2.0"

patches:
  # Staging DB user is asp_ads (base default is automarket; base is shared with dev).
  - target:
      kind: ConfigMap
      name: postgres-config
    patch: |-
      - op: replace
        path: /data/POSTGRES_USER
        value: asp_ads
  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/exec/command
        value: ["pg_isready", "-U", "asp_ads", "-d", "automarket"]
  # Pull the private GHCR images (ghcr.io/eliorion/asp-*). postgres uses a public image.
  - target:
      kind: Deployment
      name: orchestrator
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value: [{name: ghcr-pull-secret}]
  - target:
      kind: Deployment
      name: content-scraper
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value: [{name: ghcr-pull-secret}]
  - target:
      kind: Deployment
      name: url-crawler
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value: [{name: ghcr-pull-secret}]
