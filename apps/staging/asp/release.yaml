# The asp app (orchestrator, scraper/crawler lanes, analyzer, frontend).
# Chart lives in the asp repo (k8s/charts/asp) — values.yaml there carries the
# canonical image tags, bumped by the asp repo's CI on each release. Values
# here are environment overrides ONLY, never image tags.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: asp
spec:
  # Dev phase: fast feedback. New chart revisions deploy event-driven (the
  # GitRepository polls at 1m); this interval also paces drift checks/retries.
  interval: 1m
  # Helm op ceiling — must exceed the content lanes' Camoufox warm-up gated
  # readiness (initialDelay 90s) + minReadySeconds 30, or every slow warm-up
  # looks like a failed upgrade and rolls back.
  timeout: 10m
  chart:
    spec:
      chart: k8s/charts/asp
      # Chart.yaml version is static 0.1.0 — upgrade on every new git revision
      # of the (chart-path-scoped) GitRepository instead.
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: asp
        namespace: flux-system
      interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      # A failed upgrade (pods never Ready within timeout, or a failed helm
      # test) rolls back to the last good release instead of leaving the app
      # wedged. retries is REQUIRED: helm-controller performs no remediation
      # at the default retries: 0 — strategy alone is a no-op.
      retries: 3
      strategy: rollback
      remediateLastFailure: true
  rollback:
    cleanupOnFail: true
  test:
    # Run the chart's helm test hooks (curl /health + /healthz) after every
    # install/upgrade; a failing hook fails the release → rollback remediation.
    enable: true
    ignoreFailures: false
  driftDetection:
    # Revert manual kubectl drift back to the chart-rendered state.
    mode: enabled
  values:
    global:
      # Pull the private GHCR images (ghcr.io/eliorion/asp-*).
      # The ghcr-pull-secret Secret itself is owned by the databases tier.
      imagePullSecrets:
        - name: ghcr-pull-secret
    scraper:
      # Proxy lanes are generated by the chart from this list (content+crawler
      # per applicable site) — the chart default is empty, so proxies are a
      # deployment-side concern. Tailscale egress: leboncoin only (pre-refactor
      # topology). A creds-bearing proxy would use urlSecret: {name, key}
      # (secretKeyRef) instead of url.
      #proxies:
      #  - name: tailscale
      #    url: "http://100.100.98.5:8888"
      #    sites: [leboncoin]
    adminUi:
      enabled: true
    webapp:
      enable: true
