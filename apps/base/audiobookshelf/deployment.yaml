apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      #securityContext:
        #fsGroup: 33 # www-data group ID
        #runAsUser: 33 # www-data user ID
        #runAsGroup: 33 # www-data group ID

      containers:
        - name: audiobookshelf
          image: advplyr/audiobookshelf:2.31.0
          ports:
            - containerPort: 3005
          envFrom:
          - configMapRef:
              name: audiobookshelf-configmap

          #securityContext:
          #  allowPrivilegeEscalation: false
          volumeMounts:
            - name: audiobookshelf-config
              mountPath: /mnt/audiobookshelf/data/config
            - name: audiobookshelf-audiobooks
              mountPath: /mnt/audiobookshelf/data/audiobooks
            - name: audiobookshelf-podcasts
              mountPath: /mnt/audiobookshelf/data/podcasts
            - name: audiobookshelf-metadata
              mountPath: /mnt/audiobookshelf/data/metadata
            - name: audiobookshelf-books
              mountPath: /mnt/audiobookshelf/data/books

      volumes:
        - name: audiobookshelf-config
          persistentVolumeClaim:
            claimName: audiobookshelf-config-pvc
        - name: audiobookshelf-audiobooks
          persistentVolumeClaim:
            claimName: audiobookshelf-audiobooks-pvc
        - name: audiobookshelf-podcasts
          persistentVolumeClaim:
            claimName: audiobookshelf-podcasts-pvc
        - name: audiobookshelf-metadata
          persistentVolumeClaim:
            claimName: audiobookshelf-metadata-pvc
        - name: audiobookshelf-books
          persistentVolumeClaim:
            claimName: audiobookshelf-books-pvc
