apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: asp-db
spec:
  instances: 1
  bootstrap:
    initdb:
      database: automarket
      owner: app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: asp-db-init
            key: init.sql
  storage:
    size: 5Gi
