apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  namespace: asp
data:
  CHECK_INTERVAL_S: "60"
  FAILURE_THRESHOLD: "0.20"
  # Auto-pause the scraper when the DataDome block rate exceeds this in the last 5 min.
  BLOCK_THRESHOLD: "0.10"
  PAUSE_DURATION_S: "600"
  ORCHESTRATOR_PORT: "8080"
  ORCHESTRATOR_API_URL: "http://localhost:8080"
