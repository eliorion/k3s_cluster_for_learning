apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: asp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: orchestrator
          image: asp-orchestrator
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8501
              name: ui
          envFrom:
            - configMapRef:
                name: orchestrator-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: database-url
            - name: ADMIN_UI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: admin-ui-token
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
