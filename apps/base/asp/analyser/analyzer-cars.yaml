apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer-cars
  namespace: asp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer-cars
  template:
    metadata:
      labels:
        app: analyzer-cars
        component: analyzer
        vertical: cars
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: asp-analyzer
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: asp-db-app
                  key: uri
          envFrom:
            - configMapRef:
                name: analyzer-cars-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # Pure CPU/DB work — no browser, so far below the scraper's 2Gi ceiling.
              memory: "512Mi"
              cpu: "500m"
          # Backstop for a fully-wedged event loop the per-job watchdog cannot catch.
          livenessProbe:
            exec:
              command: ["/app/.venv/bin/python", "-m", "src.healthcheck"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            # readOnlyRootFilesystem → writable scratch for the worker.
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/app
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
