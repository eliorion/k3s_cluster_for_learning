# Per-vertical analyzer config. PROCESSOR_VERTICAL selects the processor (registry key) and
# filters the analysis_requests claim — one Deployment per vertical, same image.
apiVersion: v1
kind: ConfigMap
metadata:
  name: analyzer-cars-config
  namespace: asp
data:
  PROCESSOR_VERTICAL: "cars"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  CHECK_POLL_INTERVAL_S: "10"
  PER_JOB_TIMEOUT_S: "300"
