apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-crawler
  namespace: asp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-crawler
  template:
    metadata:
      labels:
        app: url-crawler
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: url-crawler
          image: asp-scraper
          imagePullPolicy: IfNotPresent
          command: ["/app/.venv/bin/python", "-m", "src.crawler.main"]
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: asp-db-app
                  key: uri
          envFrom:
            - configMapRef:
                name: url-crawler-config
          resources:
            requests:
              memory: "500Mi"
              cpu: "100m"
            limits:
              # Same Camoufox headless Firefox warm-up as the scraper — give it
              # headroom above 1Gi to avoid OOMKills under load.
              memory: "1Gi"
              cpu: "250m"
