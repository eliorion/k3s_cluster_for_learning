apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: asp
data:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  # Upstream orchestrator (in-cluster Service). The BFF is the only client.
  ORCHESTRATOR_URL: "http://orchestrator:8080"
  # Keycloak token verification. Issuer must match the realm the SPA logs into.
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/asp"
  KEYCLOAK_AUDIENCE: "asp-frontend"
  # Per-user chat rate limit.
  CHAT_RATE_LIMIT: "20"
  CHAT_RATE_WINDOW_S: "60"
