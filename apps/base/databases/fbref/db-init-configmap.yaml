apiVersion: v1
kind: ConfigMap
metadata:
  name: fbref-db-init
  namespace: fbref
data:
  init.sql: |
    -- =========================================================================
    -- init.sql — fbref full schema (hand-synced copy of
    -- services/fbref/postgres/init.sql, + CNPG grants).
    -- Idempotent (IF NOT EXISTS): safe on a clean DB or re-run.
    -- ⚠ Keep in sync with services/fbref/postgres/init.sql.
    -- =========================================================================

    -- Clubs (squads).
    CREATE TABLE IF NOT EXISTS clubs (
        id           BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        fbref_id     TEXT UNIQUE NOT NULL,
        name         TEXT,
        url          TEXT NOT NULL,
        season       TEXT,
        country      TEXT,
        scraped_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Players.
    CREATE TABLE IF NOT EXISTS players (
        id                      BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        fbref_id                TEXT UNIQUE NOT NULL,
        name                    TEXT,
        url                     TEXT NOT NULL,
        position                TEXT,
        footed                  TEXT,
        born_date               DATE,
        nationality             TEXT,
        current_club_fbref_id   TEXT,
        height_cm               INTEGER,
        weight_kg               INTEGER,
        scraped_at              TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Generic stat capture (EAV): one row per (player, table, season, comp, team, stat).
    CREATE TABLE IF NOT EXISTS player_stats (
        id              BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        player_fbref_id TEXT NOT NULL,
        table_id        TEXT NOT NULL,
        season          TEXT NOT NULL DEFAULT '',
        competition     TEXT NOT NULL DEFAULT '',
        team            TEXT NOT NULL DEFAULT '',
        stat_name       TEXT NOT NULL,
        stat_value      TEXT,
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE (player_fbref_id, table_id, season, competition, team, stat_name)
    );
    CREATE INDEX IF NOT EXISTS idx_player_stats_player ON player_stats (player_fbref_id);

    -- URL work queue: crawler enqueues club + player URLs, scraper claims them
    -- FOR UPDATE SKIP LOCKED.
    CREATE TABLE IF NOT EXISTS url_queue (
        id          BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
        url         TEXT UNIQUE NOT NULL,
        kind        TEXT NOT NULL CHECK (kind IN ('club', 'player')),
        status      TEXT NOT NULL DEFAULT 'pending'
                    CHECK (status IN ('pending', 'in_progress', 'done', 'failed')),
        attempts    INTEGER NOT NULL DEFAULT 0,
        worker_id   TEXT,
        locked_at   TIMESTAMPTZ,
        last_error  TEXT,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        completed_at TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS idx_url_queue_claim ON url_queue (status, kind);

    -- -------------------------------------------------------------------------
    -- Grants. postInitApplicationSQLRefs runs as the postgres superuser, so the
    -- objects above are owned by postgres — the `app` user (DATABASE_URL) has no
    -- privileges by default. Grant app full DML + make it the default going forward.
    -- -------------------------------------------------------------------------
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO app;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO app;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO app;

    -- -------------------------------------------------------------------------
    -- Read-only role for Grafana. Created NOLOGIN here; the CNPG managed role
    -- (spec.managed.roles) flips LOGIN on and sets the password from a Secret.
    -- -------------------------------------------------------------------------
    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'grafana_ro') THEN
        CREATE ROLE grafana_ro;
      END IF;
    END $$;
    GRANT USAGE ON SCHEMA public TO grafana_ro;
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO grafana_ro;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO grafana_ro;
