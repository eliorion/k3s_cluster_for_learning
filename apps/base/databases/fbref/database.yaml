apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: fbref-db
  namespace: fbref
spec:
  instances: 2
  # PostgreSQL image, pinned to what the operator deployed (Renovate bumps it).
  # NOTE: field is imageName (not image); ghcr.io/cloudnative-pg/cloudnative-pg
  # is the operator image and must never be used here.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie

  postgresql:
    synchronous:
      method: any
      number: 1
      # preferred: fall back to async when the replica is unavailable so writes
      # never block (single-node homelab — no real HA to protect).
      dataDurability: preferred
    parameters:
      max_connections: "100"
      effective_cache_size: "512MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"

  bootstrap:
    initdb:
      database: fbref
      owner: app
      # No postInit bootstrap: the schema is owned by the fbref-db-migrations
      # Flyway Job (asp repo, services/fbref/postgres/migrations/) — same
      # migration path as asp. A fresh cluster starts empty; Flyway builds the
      # schema as `app`, which then owns every object.

  # Operator-managed roles. The roles themselves are created (NOLOGIN) by the
  # Flyway migrations; here they are flipped to LOGIN and their passwords set
  # from basic-auth Secrets (staging overlay, sops-encrypted). Order vs the
  # migration Job is irrelevant — both sides are idempotent.
  managed:
    roles:
      - name: grafana_ro
        ensure: present
        login: true
        passwordSecret:
          name: fbref-grafana-ro
      # Row-edit role for the NocoDB admin UI (SELECT all + url_queue DML +
      # worker_control UPDATE — grants live in migration V3).
      - name: nocodb
        ensure: present
        login: true
        passwordSecret:
          name: fbref-nocodb

  storage:
    size: 5Gi
