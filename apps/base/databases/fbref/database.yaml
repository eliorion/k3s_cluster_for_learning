apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: fbref-db
  namespace: fbref
spec:
  instances: 2
  # PostgreSQL image, pinned to what the operator deployed (Renovate bumps it).
  # NOTE: field is imageName (not image); ghcr.io/cloudnative-pg/cloudnative-pg
  # is the operator image and must never be used here.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie

  postgresql:
    synchronous:
      method: any
      number: 1
      # preferred: fall back to async when the replica is unavailable so writes
      # never block (single-node homelab — no real HA to protect).
      dataDurability: preferred
    parameters:
      max_connections: "100"
      effective_cache_size: "512MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"

  bootstrap:
    initdb:
      database: fbref
      owner: app
      # Schema is owned by Flyway (fbref-db-migrations Job, gated ahead of apps),
      # mirroring asp — no postInit bootstrap. A fresh cluster comes up empty and
      # the Job applies V1+; the existing cluster is baselined at 0 and healed by
      # V2/V3 (drops the stale kind CHECK, adds worker_control).

  # Operator-managed read-only role for Grafana. Flyway V1 creates the role
  # (NOLOGIN); here CNPG ensures it present + flips it to LOGIN with the password
  # from the basic-auth Secret (staging overlay, sops-encrypted).
  managed:
    roles:
      - name: grafana_ro
        ensure: present
        login: true
        passwordSecret:
          name: fbref-grafana-ro

  storage:
    size: 5Gi
