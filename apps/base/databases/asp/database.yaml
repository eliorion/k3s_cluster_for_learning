apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: asp-db
spec:
  instances: 2
  # PostgreSQL image, pinned to what the operator deployed (Renovate bumps it).
  # NOTE: field is imageName (not image); ghcr.io/cloudnative-pg/cloudnative-pg
  # is the operator image and must never be used here.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie

  postgresql:
    # Synchronous replication: primary waits for 1 replica ack per commit.
    # Requires number < instances — keep in sync if instances changes.
    synchronous:
      method: any
      number: 1
      # preferred: fall back to async when the replica is unavailable so
      # writes never block (single-node homelab — no real HA to protect).
      dataDurability: preferred
    parameters:
      max_connections: "200"
      # shared_buffers: "256MB"
      effective_cache_size: "768MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      # Enable logical replication for CDC
      wal_level: logical

  bootstrap:
    initdb:
      database: automarket
      owner: app
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: asp-db-init
            key: init.sql
  # Superuser secret
  #  superuserSecret:
  #    name: postgres-superuser-secret

  # Enable monitoring
  #  monitoring:
  #    enablePodMonitor: true
  # WAL storage (separate PVC for better I/O isolation)
  #  walStorage:
  #    size: 5Gi
  #    storageClass: fast-ssd

  storage:
    size: 5Gi
