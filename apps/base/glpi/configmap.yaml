apiVersion: v1
kind: ConfigMap
metadata:
  name: glpi-configmap
  namespace: glpi
data:
  TIMEZONE: "Europe/Paris"
  GLPI_DB_PORT: "3306"
  GLPI_DB_HOST: "db"
  GLPI_DB_NAME: "glpi_db"
  GLPI_DB_USER: "glpi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glpi-db-configmap
  namespace: glpi
data:
  MARIADB_RANDOM_ROOT_PASSWORD: "yes"
  MARIADB_DATABASE: "glpi_db"
  MARIADB_USER: "glpi"
