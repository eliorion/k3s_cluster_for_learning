# TEMPORARY — seed-from-k3s only. Remove after the Talos asp-db is seeded and
# verified (doc 06 step 3). Replaces the initdb bootstrap with a recovery
# bootstrap that pulls the latest base backup + WAL from the k3s archive path
# (serverName asp-db) in the shared staging bucket. CNPG honors a bootstrap
# stanza only at first cluster creation, so this MUST be present before the
# Talos cluster is created, and is inert once it exists.
- op: replace
  path: /spec/bootstrap
  value:
    recovery:
      source: asp-db-k3s
      database: automarket
      owner: app
- op: add
  path: /spec/externalClusters
  value:
    - name: asp-db-k3s
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: r2-store
          serverName: asp-db
