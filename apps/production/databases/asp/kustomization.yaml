apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: asp

resources:
  - ../../../base/databases/asp
  - r2-backup-credentials.enc.yaml
  - objectstore.yaml
  - scheduledbackup.yaml
  # TEMPORARY seed-from-staging — remove after seeding (plan Step 6)
  - r2-staging-backup-credentials.enc.yaml
  - objectstore-staging.yaml

patches:
  # Attach the Barman Cloud Plugin to the CNPG cluster for R2 backups.
  - path: cluster-backup-patch.yaml
    target:
      kind: Cluster
      name: asp-db
  # TEMPORARY seed-from-staging — remove after seeding (plan Step 6)
  - path: cluster-recovery-patch.yaml
    target:
      kind: Cluster
      name: asp-db
