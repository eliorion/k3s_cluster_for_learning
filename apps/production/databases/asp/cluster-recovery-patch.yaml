# TEMPORARY — seed-from-staging only. Remove after the prod asp-db is seeded and
# verified (see plan Step 6). Replaces the initdb bootstrap with a recovery
# bootstrap that pulls the latest base backup + WAL from the STAGING bucket.
# CNPG honors a bootstrap stanza only at first cluster creation, so this MUST be
# present before the prod cluster is created, and is inert once it exists.
- op: replace
  path: /spec/bootstrap
  value:
    recovery:
      source: asp-db-staging
      database: automarket
      owner: app
- op: add
  path: /spec/externalClusters
  value:
    - name: asp-db-staging
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: r2-store-staging
          serverName: asp-db
