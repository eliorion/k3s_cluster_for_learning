# TEMPORARY — seed-from-staging only. Remove after the prod asp-db is seeded and
# verified (see plan Step 6). Points at the STAGING R2 bucket so the prod cluster
# can recover its initial data from staging's backup. Prod's own archiving still
# goes through objectstore.yaml (r2-store -> s3://asp-cnpg-production).
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: r2-store-staging
spec:
  retentionPolicy: "7d"
  configuration:
    destinationPath: "s3://asp-cnpg-staging"
    endpointURL: "https://07e577de68147de704bb467debe46e21.r2.cloudflarestorage.com"
    s3Credentials:
      accessKeyId:
        name: r2-staging-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: r2-staging-credentials
        key: ACCESS_KEY_SECRET
    wal:
      compression: gzip
      encryption: AES256
    data:
      compression: gzip
      encryption: AES256
      jobs: 2
  instanceSidecarConfiguration:
    # Required for Cloudflare R2: boto3 >= 1.36 sends data-integrity checksums
    # that R2 rejects (XAmzContentSHA256Mismatch). These restore compatibility
    # for both backup and restore. See plugin-barman-cloud issue #411.
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
